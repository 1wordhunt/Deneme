<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexAI Sovereign | Real Engine v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root { --primary: #10a37f; --bg: #ffffff; --sidebar: #171717; --text: #212121; --border: #e5e5e5; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
        body { height: 100vh; display: flex; background: var(--bg); color: var(--text); overflow: hidden; }

        /* Sidebar - Çarpı Butonu Eklendi */
        #sidebar {
            width: 260px; background: var(--sidebar); color: #fff; display: flex;
            flex-direction: column; padding: 12px; transition: 0.3s; z-index: 1000;
        }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .new-btn { 
            flex: 1; display: flex; align-items: center; gap: 8px; padding: 10px;
            background: transparent; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: #fff; cursor: pointer;
        }
        .close-btn { display: none; background: none; border: none; color: #fff; cursor: pointer; }
        
        /* Main Chat Area */
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }
        header { 
            padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; 
            align-items: center; justify-content: space-between; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
        }
        .menu-btn { display: none; cursor: pointer; }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 24px; }
        .msg { display: flex; gap: 16px; max-width: 850px; margin: 0 auto; width: 100%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .avatar { width: 34px; height: 34px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-weight: 700; color: #fff; }
        .avatar-ai { background: var(--primary); }
        .avatar-user { background: #6366f1; }
        .content { flex: 1; line-height: 1.7; font-size: 1rem; color: #374151; white-space: pre-wrap; }

        /* Giriş Alanı - Yukarı Çekildi */
        .input-container { padding: 25px 20px 35px 20px; display: flex; justify-content: center; background: #fff; }
        .input-wrapper {
            max-width: 800px; width: 100%; background: #fff; border: 1.5px solid var(--border);
            border-radius: 20px; display: flex; align-items: center; padding: 8px 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        #user-input { flex: 1; border: none; outline: none; font-size: 1rem; padding: 10px; background: transparent; }
        .send-btn { background: var(--primary); color: #fff; border: none; border-radius: 10px; width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        @media (max-width: 768px) {
            #sidebar { position: absolute; left: -260px; height: 100%; }
            #sidebar.open { left: 0; }
            .menu-btn, .close-btn { display: block; }
        }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="sidebar-header">
        <button class="new-btn" onclick="location.reload()">
            <span class="material-symbols-rounded">add</span> Yeni Sohbet
        </button>
        <button class="close-btn" onclick="toggleSidebar()"><span class="material-symbols-rounded">close</span></button>
    </div>
    <div style="flex:1;"></div>
    <div style="padding: 12px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem;">
        <b>Burak</b> <span style="color:var(--primary)">• Developer</span>
    </div>
</aside>

<main id="main">
    <header>
        <span class="material-symbols-rounded menu-btn" onclick="toggleSidebar()">menu</span>
        <div style="font-weight: 700;">NexAI Sovereign</div>
        <span class="material-symbols-rounded" style="opacity: 0.4;">bolt</span>
    </header>

    <div id="chat-window">
        <div class="msg">
            <div class="avatar avatar-ai">N</div>
            <div class="content">Sistem çevrimiçi. Gerçek zeka motoru bağlandı. Burak, seni dinliyorum.</div>
        </div>
    </div>

    <div class="input-container">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Gerçek bir soru sor..." autocomplete="off">
            <button class="send-btn" id="btn" onclick="runAI()">
                <span class="material-symbols-rounded">arrow_upward</span>
            </button>
        </div>
    </div>
</main>

<script>
    // --- BURAYA HF TOKENINI YAPIŞTIR ---
    const HF_TOKEN = "BURAYA_YAPISTIR"; 
    const MODEL_NAME = "moonshotai/Kimi-K2-Instruct-0905";

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    const input = document.getElementById('user-input');
    const chatWindow = document.getElementById('chat-window');
    const btn = document.getElementById('btn');

    input.addEventListener("keypress", (e) => { if(e.key === "Enter") runAI(); });

    async function runAI() {
        const text = input.value.trim();
        if(!text) return;

        addMessage('user', text);
        input.value = "";
        btn.disabled = true;

        addMessage('ai', "..."); 
        const responseDiv = chatWindow.lastElementChild.querySelector('.content');

        try {
            // Mert'in attığı OpenAI uyumlu router yapısı
            const response = await fetch("https://router.huggingface.co/v1/chat/completions", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json", 
                    "Authorization": `Bearer ${HF_TOKEN}` 
                },
                body: JSON.stringify({ 
                    model: MODEL_NAME,
                    messages: [{ "role": "user", "content": text }],
                    max_tokens: 500
                })
            });

            const data = await response.json();
            const result = data.choices[0].message.content;
            
            responseDiv.innerText = result; // Saçma analiz yazısı yerine gerçek cevap!

        } catch (err) {
            responseDiv.innerText = "Hata: Token hatalı veya model meşgul. Kanka HF Token'ı kontrol et!";
        } finally {
            btn.disabled = false;
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    }

    function addMessage(who, text) {
        const d = document.createElement('div');
        d.className = "msg";
        d.innerHTML = `<div class="avatar avatar-${who}">${who==='ai'?'N':'B'}</div><div class="content">${text}</div>`;
        chatWindow.appendChild(d);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }
</script>

</body>
</html>
