<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexAI | Developer Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root { 
            --bg: #ffffff; --sidebar: #202123; --sidebar-hover: #2a2b32;
            --primary: #10a37f; --text-dark: #202124; --border: #e5e7eb;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { height: 100vh; display: flex; overflow: hidden; background: var(--bg); color: var(--text-dark); }

        /* --- GİRİŞ & DOĞRULAMA EKRANI --- */
        .overlay-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .login-box {
            background: #fff; padding: 40px; border-radius: 12px;
            text-align: center; width: 90%; max-width: 400px; border: 1px solid var(--border);
        }
        .login-box h1 { font-size: 2rem; margin-bottom: 10px; font-weight: 600; }
        .input-field {
            width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 8px;
            font-size: 1rem; margin-bottom: 15px; outline: none; text-align: center;
        }
        .input-field:focus { border-color: var(--primary); }
        .btn-primary {
            width: 100%; padding: 14px; background: var(--primary); color: white; border: none;
            border-radius: 8px; font-size: 1rem; font-weight: 500; cursor: pointer;
        }
        #verify-section { display: none; } /* Başlangıçta gizli */

        /* --- ANA UYGULAMA --- */
        #app-screen { display: none; width: 100%; height: 100%; flex-direction: row; }

        /* SOL MENÜ */
        #sidebar {
            width: 260px; background: var(--sidebar); color: #ececf1; display: flex;
            flex-direction: column; padding: 10px; transition: 0.3s; z-index: 50;
        }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .new-chat-btn {
            flex: 1; display: flex; align-items: center; gap: 10px; padding: 12px;
            background: transparent; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
            color: white; cursor: pointer;
        }
        .close-sidebar-btn { 
            display: none; background: none; border: none; color: white; cursor: pointer; padding: 10px;
        }
        .history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .history-item { padding: 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 10px; }
        .user-profile { padding: 15px 10px 5px 10px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 10px; font-size: 0.85rem; }

        /* SOHBET ALANI */
        #main-chat { flex: 1; display: flex; flex-direction: column; position: relative; }
        header { padding: 15px 20px; display: flex; align-items: center; border-bottom: 1px solid var(--border); }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 24px; }
        
        .msg-container { display: flex; gap: 15px; max-width: 800px; margin: 0 auto; width: 100%; }
        .msg-avatar { width: 30px; height: 30px; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: white; flex-shrink: 0; }
        .avatar-ai { background: var(--primary); }
        .avatar-user { background: #6366f1; }
        .msg-content { flex: 1; font-size: 1rem; line-height: 1.6; padding-top: 2px; }
        pre { background: #f1f5f9; padding: 15px; border-radius: 8px; overflow-x: auto; font-family: monospace; }

        /* GİRİŞ ALANI (Yukarı çekildi ve sabitlendi) */
        .input-area { padding: 15px 20px 25px 20px; display: flex; justify-content: center; background: #fff; }
        .input-wrapper {
            max-width: 800px; width: 100%; background: #fff; border: 1px solid var(--border);
            border-radius: 24px; display: flex; align-items: flex-end; padding: 8px 16px; box-shadow: 0 0 15px rgba(0,0,0,0.05);
        }
        #user-input {
            flex: 1; border: none; outline: none; padding: 10px 5px; font-size: 1rem; background: transparent;
        }
        .icon-btn { background: none; border: none; cursor: pointer; color: #9ca3af; padding: 6px; border-radius: 8px; }
        .send-btn { background: var(--primary); color: white; border-radius: 8px; padding: 6px; }

        /* Mobil Düzenlemeler */
        .mobile-menu-btn { display: none; background: none; border: none; cursor: pointer; }
        @media (max-width: 768px) {
            #sidebar { position: absolute; left: -260px; height: 100%; }
            #sidebar.open { left: 0; }
            .mobile-menu-btn { display: block; margin-right: 15px; }
            .close-sidebar-btn { display: block; } /* Çarpı sadece mobilde görünsün */
        }
    </style>
</head>
<body>

<div id="login-screen" class="overlay-screen">
    <div class="login-box" id="email-section">
        <h1>NexAI</h1>
        <p style="margin-bottom: 20px; color: #666;">Developer sürümüne giriş yapın.</p>
        <input type="email" id="email-input" class="input-field" placeholder="E-posta adresiniz">
        <button class="btn-primary" onclick="sendCode()">Kodu Gönder</button>
    </div>

    <div class="login-box" id="verify-section">
        <h1>Doğrulama</h1>
        <p style="margin-bottom: 20px; color: #666;">E-postanıza gelen 4 haneli kodu girin.</p>
        <input type="number" id="code-input" class="input-field" placeholder="Örn: 1234">
        <button class="btn-primary" onclick="verifyCode()">Giriş Yap</button>
    </div>
</div>

<div id="app-screen">
    <aside id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="clearChat()">
                <span class="material-symbols-rounded">add</span> Yeni Sohbet
            </button>
            <button class="close-sidebar-btn" onclick="toggleSidebar()">
                <span class="material-symbols-rounded">close</span>
            </button>
        </div>
        <div class="history-list" id="history-list"></div>
        <div class="user-profile">
            <span class="material-symbols-rounded">account_circle</span>
            <span id="user-display"></span>
            <span style="margin-left: auto; font-size:0.7rem; color:var(--primary);">Developer</span>
        </div>
    </aside>

    <main id="main-chat">
        <header>
            <button class="mobile-menu-btn" onclick="toggleSidebar()">
                <span class="material-symbols-rounded">menu</span>
            </button>
            <div style="font-weight: 600;">NexAI</div>
        </header>

        <div id="chat-window">
            <div class="msg-container">
                <div class="msg-avatar avatar-ai"><span class="material-symbols-rounded" style="font-size: 18px;">auto_awesome</span></div>
                <div class="msg-content">Sistem çevrimiçi. Burak, sana nasıl yardımcı olabilirim?</div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Gerçek bir soru sor..." autocomplete="off">
                <button class="icon-btn send-btn" onclick="sendMessage()">
                    <span class="material-symbols-rounded">arrow_upward</span>
                </button>
            </div>
        </div>
    </main>
</div>

<script>
    // --- GİRİŞ VE DOĞRULAMA ---
    let savedEmail = "";
    let correctCode = "";

    function sendCode() {
        const email = document.getElementById('email-input').value.trim();
        if(!email.includes('@')) return alert("Lütfen geçerli bir e-posta girin.");
        
        savedEmail = email;
        correctCode = Math.floor(1000 + Math.random() * 9000).toString(); 
        
        // Simülasyon: Kullanıcıya kodu alert ile gösteriyoruz (Gerçekte mail gider)
        alert(`GÜVENLİK KODUNUZ: ${correctCode}\n(Gerçek uygulamada bu mailinize gidecek)`);
        
        document.getElementById('email-section').style.display = "none";
        document.getElementById('verify-section').style.display = "block";
    }

    function verifyCode() {
        const inputCode = document.getElementById('code-input').value;
        if(inputCode === correctCode) {
            document.getElementById('user-display').innerText = savedEmail;
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('app-screen').style.display = "flex";
            loadHistory();
        } else {
            alert("Hatalı kod!");
        }
    }

    // --- MENÜ VE SOHBET ---
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function clearChat() {
        document.getElementById('chat-window').innerHTML = `
            <div class="msg-container">
                <div class="msg-avatar avatar-ai"><span class="material-symbols-rounded" style="font-size: 18px;">auto_awesome</span></div>
                <div class="msg-content">Yeni sohbet başlatıldı.</div>
            </div>`;
        if(window.innerWidth <= 768) toggleSidebar();
    }

    const input = document.getElementById('user-input');
    const chat = document.getElementById('chat-window');
    
    input.addEventListener("keypress", (e) => { if(e.key === "Enter") sendMessage(); });

    // BURAYA GERÇEK OPENAI API KEY GELECEK (Şu an deneme amaçlı açık bir key varsa buraya yazılır, yoksa fetch simülasyonu çalışır)
    const API_KEY = "BURAYA_API_KEY_YAZILMALI"; 

    async function sendMessage() {
        const text = input.value.trim();
        if(!text) return;

        addMsg('user', text);
        input.value = "";
        
        // Geçmişe kaydet (Sadece başlığı)
        saveHistory(text);

        // API Çağrısı (Eğer API Key yoksa gerçekçi, hızlı bir yanıt simüle et)
        addMsg('ai', "<i style='color:#999;'>Düşünüyor...</i>"); // Yükleniyor efekti
        
        try {
            /* GERÇEK API KODU BURADA ÇALIŞACAK:
            const response = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                body: JSON.stringify({ model: "gpt-3.5-turbo", messages: [{ role: "user", content: text }] })
            });
            const data = await response.json();
            const realAnswer = data.choices[0].message.content;
            */
            
            // Simülasyon Yanıtı (API Key eklenene kadar)
            setTimeout(() => {
                chat.lastChild.remove(); // Yükleniyor yazısını sil
                let answer = "";
                if(text.toLowerCase().includes("merhaba") || text.toLowerCase().includes("selam")) {
                    answer = "Merhaba Burak. Geliştirici modunda aktifim. Sana kodlama, veri analizi veya proje yönetiminde nasıl yardımcı olabilirim?";
                } else if(text.toLowerCase().includes("hesapla") || text.match(/\d/)) {
                    answer = "Matematiksel işleminizi algıladım. Çıktı: Doğrusal çözümleme tamamlandı."; // Gerçek API buraya doğru cevabı koyacak
                } else {
                    answer = `Sorduğun "${text}" konusu hakkında detaylı veri topluyorum. API bağlantısı tam olarak sağlandığında buraya saniyeler içinde Wikipedia/GitHub düzeyinde gerçek bilgiler dökülecek.`;
                }
                addMsg('ai', answer);
            }, 800); // 0.8 saniyede süper hızlı cevap

        } catch (error) {
            chat.lastChild.remove();
            addMsg('ai', "API bağlantı hatası. İnternetinizi veya API anahtarınızı kontrol edin.");
        }
    }

    function addMsg(sender, text) {
        const d = document.createElement('div');
        d.className = "msg-container";
        d.innerHTML = sender === 'ai' 
            ? `<div class="msg-avatar avatar-ai"><span class="material-symbols-rounded" style="font-size: 18px;">auto_awesome</span></div><div class="msg-content">${text}</div>`
            : `<div class="msg-avatar avatar-user">B</div><div class="msg-content">${text}</div>`;
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
    }

    // --- LOCALSTORAGE GEÇMİŞ ---
    function saveHistory(text) {
        let h = JSON.parse(localStorage.getItem(savedEmail)) || [];
        if(h.length === 0 || !h.includes(text.substring(0, 20))) {
            h.unshift(text.substring(0, 20) + "...");
            localStorage.setItem(savedEmail, JSON.stringify(h));
            loadHistory();
        }
    }
    function loadHistory() {
        let h = JSON.parse(localStorage.getItem(savedEmail)) || [];
        document.getElementById('history-list').innerHTML = h.map(item => 
            `<div class="history-item"><span class="material-symbols-rounded" style="font-size:16px;">chat_bubble</span>${item}</div>`
        ).join("");
    }
</script>

</body>
</html>
