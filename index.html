<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexAI | Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a73e8; --text: #202124; --bg: #ffffff; --ai-bg: #f8f9fa; --border: #dee2e6; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }

        /* Üst Bar */
        header { 
            padding: 16px 20px; background: #fff; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        header h1 { font-size: 1.25rem; margin: 0; color: var(--primary); font-weight: 700; }
        .status { font-size: 0.75rem; color: #5f6368; display: flex; align-items: center; }
        .dot { height: 8px; width: 8px; background: #34a853; border-radius: 50%; margin-right: 6px; }

        /* Mesajlaşma Alanı */
        #chat-window { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px;
            max-width: 800px; margin: 0 auto; width: 100%;
        }
        .msg-row { display: flex; width: 100%; flex-direction: column; }
        .msg { padding: 14px 18px; border-radius: 20px; max-width: 85%; font-size: 1rem; line-height: 1.5; }
        
        .ai { align-self: flex-start; background: var(--ai-bg); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 4px; }
        .user { align-self: flex-end; background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }

        /* Görsel ve Kod Çıktıları */
        .output-img { width: 100%; border-radius: 16px; margin-top: 10px; border: 1px solid var(--border); }
        pre { background: #1e1e1e; color: #dcdcdc; padding: 16px; border-radius: 12px; font-size: 0.85rem; overflow-x: auto; }

        /* Alt Giriş Alanı (Mesaj Yazma Yeri) */
        .input-area { 
            padding: 20px; background: #fff; border-top: 1px solid var(--border);
            display: flex; justify-content: center; align-items: center;
        }
        .input-box { 
            max-width: 760px; width: 100%; background: #f1f3f4; border-radius: 30px;
            display: flex; align-items: center; padding: 6px 16px; transition: 0.2s;
        }
        .input-box:focus-within { background: #fff; box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.2); }
        
        #user-input { 
            flex: 1; border: none; background: transparent; padding: 12px; 
            font-size: 1rem; outline: none; color: var(--text);
        }
        
        .btn { background: none; border: none; cursor: pointer; color: #5f6368; padding: 8px; border-radius: 50%; transition: 0.2s; }
        .btn:hover { background: rgba(0,0,0,0.05); color: var(--primary); }
        .send-btn { color: var(--primary); font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <h1>NexAI</h1>
    <div class="status"><span class="dot"></span> Aktif</div>
</header>

<div id="chat-window">
    <div class="msg ai">Merhaba! Ben NexAI. Play Store için optimize edilmiş yeni arayüzümle hazırım. Neyi tasarlayalım?</div>
</div>

<div class="input-area">
    <div class="input-box">
        <button class="btn" onclick="document.getElementById('img-up').click()">🖼️</button>
        <input type="file" id="img-up" hidden onchange="imgHandle()">
        
        <input type="text" id="user-input" placeholder="Mesajınızı buraya yazın..." autocomplete="off">
        
        <button class="btn" onclick="startMic()">🎤</button>
        <button class="btn send-btn" onclick="send()">Gönder</button>
    </div>
</div>

<script>
    const input = document.getElementById('user-input');
    const windowChat = document.getElementById('chat-window');

    input.addEventListener("keypress", (e) => { if(e.key === "Enter") send(); });

    function send() {
        const val = input.value.trim();
        if(!val) return;

        addMsg('user', val);
        input.value = "";

        // Otonom Yanıt
        if(val.toLowerCase().includes("çiz") || val.toLowerCase().includes("resim")) {
            addMsg('ai', `🎨 "${val}" için görsel tasarlanıyor...`);
            setTimeout(() => {
                const i = document.createElement('img');
                i.src = `https://picsum.photos/seed/${Math.random()}/1024/1024`;
                i.className = 'output-img';
                windowChat.appendChild(i);
                scroll();
            }, 1500);
        } else {
            setTimeout(() => addMsg('ai', "Bu isteği analiz ettim. Hemen uyguluyorum."), 800);
        }
    }

    function addMsg(s, t) {
        const d = document.createElement('div');
        d.className = `msg ${s}`;
        d.innerHTML = t;
        windowChat.appendChild(d);
        scroll();
    }

    function scroll() { windowChat.scrollTop = windowChat.scrollHeight; }
    
    function startMic() {
        const r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        r.lang = 'tr-TR'; r.start();
        r.onresult = (e) => { input.value = e.results[0][0].transcript; send(); };
    }

    function imgHandle() {
        addMsg('user', "<i>Resim yüklendi.</i>");
        setTimeout(() => addMsg('ai', "Resmi inceledim, mükemmel görünüyor!"), 1000);
    }
</script>

</body>
</html>
