<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexAI Ultra | No-Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root { --bg: #ffffff; --primary: #10a37f; --text: #202124; --sidebar: #202123; --border: #e5e7eb; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { height: 100vh; display: flex; background: var(--bg); color: var(--text); overflow: hidden; }

        /* Sidebar - Çarpı Eklenmiş Hali */
        #sidebar {
            width: 260px; background: var(--sidebar); color: white; display: flex;
            flex-direction: column; padding: 15px; transition: 0.3s; z-index: 100;
        }
        .sidebar-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .new-btn { 
            flex: 1; display: flex; align-items: center; gap: 10px; padding: 12px;
            background: transparent; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: white; cursor: pointer;
        }
        .close-btn { background: none; border: none; color: white; cursor: pointer; padding: 5px; display: none; }

        /* Ana Ekran */
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }
        header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .menu-icon { cursor: pointer; display: none; }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        /* Mesaj Balonları */
        .msg { display: flex; gap: 15px; max-width: 800px; margin: 0 auto; width: 100%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .avatar { width: 32px; height: 32px; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-weight: bold; color: white; }
        .avatar-ai { background: var(--primary); }
        .avatar-user { background: #6366f1; }
        .content { flex: 1; line-height: 1.6; font-size: 1rem; white-space: pre-wrap; }

        /* Giriş Alanı - Milimetrik Ayarlı */
        .input-area { padding: 20px; background: white; display: flex; justify-content: center; }
        .input-box {
            max-width: 800px; width: 100%; background: white; border: 1px solid var(--border);
            border-radius: 16px; display: flex; align-items: center; padding: 10px 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        #user-input { flex: 1; border: none; outline: none; font-size: 1rem; padding: 5px; }
        .send-btn { background: var(--primary); color: white; border: none; border-radius: 8px; padding: 8px; cursor: pointer; display: flex; }
        .send-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* Mobil */
        @media (max-width: 768px) {
            #sidebar { position: absolute; left: -260px; height: 100%; }
            #sidebar.open { left: 0; }
            .menu-icon, .close-btn { display: block; }
        }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="sidebar-top">
        <button class="new-btn" onclick="location.reload()">
            <span class="material-symbols-rounded">add</span> Yeni Sohbet
        </button>
        <button class="close-btn" onclick="toggleSidebar()"><span class="material-symbols-rounded">close</span></button>
    </div>
    <div style="flex:1; font-size: 0.8rem; opacity: 0.5;">Geçmiş Sohbetler (Otomatik)</div>
    <div style="padding-top:10px; border-top:1px solid rgba(255,255,255,0.1); font-size: 0.85rem;">
        <b>Burak</b> <span style="color:var(--primary)">• Developer</span>
    </div>
</aside>

<main id="main">
    <header>
        <span class="material-symbols-rounded menu-icon" onclick="toggleSidebar()">menu</span>
        <b style="font-size: 1.1rem;">NexAI <span style="font-weight: 400; opacity: 0.5; font-size: 0.8rem;">ULTRA</span></b>
        <span class="material-symbols-rounded" style="opacity: 0.5;">settings</span>
    </header>

    <div id="chat-window">
        <div class="msg">
            <div class="avatar avatar-ai">N</div>
            <div class="content">Selam Burak! Sisteme direkt giriş yaptın. Herhangi bir e-posta veya kod gerekmiyor. Gerçek yapay zeka motoru bağlandı. Ne yapıyoruz?</div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-box">
            <input type="text" id="user-input" placeholder="NexAI'ye gerçek bir şey sor..." autocomplete="off">
            <button class="send-btn" id="btn" onclick="askAI()">
                <span class="material-symbols-rounded">arrow_upward</span>
            </button>
        </div>
    </div>
</main>

<script>
    // --- GERÇEK API ENTEGRASYONU ---
    // Buraya Google AI Studio'dan aldığın API Key'i yazarsan uçuşa geçeriz.
    const API_KEY = "BURAYA_API_KEY_GELECEK"; 

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    const input = document.getElementById('user-input');
    const window = document.getElementById('chat-window');
    const btn = document.getElementById('btn');

    input.addEventListener("keypress", (e) => { if(e.key === "Enter") askAI(); });

    async function askAI() {
        const prompt = input.value.trim();
        if(!prompt) return;

        addMessage('user', prompt);
        input.value = "";
        btn.disabled = true;

        // Gerçek API Çağrısı Başlatılıyor
        addMessage('ai', "..."); 
        const lastMsg = chatWindow.lastElementChild.querySelector('.content');

        try {
            // Burası gerçek yapay zeka motoru (Google Gemini)
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            const result = data.candidates[0].content.parts[0].text;
            lastMsg.innerText = result; // Saçma sapan "analiz ediyorum" yazısı bitti!

        } catch (err) {
            lastMsg.innerText = "Kanka API Key girilmemiş veya hata oluştu. Ama sistem hazır, API Key'i yapıştırdığın an dünyanın en zeki botu olacak!";
            console.error(err);
        } finally {
            btn.disabled = false;
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    }

    function addMessage(who, text) {
        const div = document.createElement('div');
        div.className = "msg";
        div.innerHTML = `
            <div class="avatar avatar-${who}">${who === 'ai' ? 'N' : 'B'}</div>
            <div class="content">${text}</div>
        `;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }
</script>

</body>
</html>
